# Frontend + backend as separate containers, behind the VPS's existing Traefik
# instance (shared across other sites). Usage:
#   1) cp .env.example .env   (fill in JWT_SECRET, MANAGER_PASSWORD, FRONTEND_URL)
#   2) Confirm `traefik-public` below matches the real network name of your
#      Traefik stack (docker network ls), and that the Host() rules match your
#      real domains.
#   3) docker compose up -d --build

services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      # Talk to the mongo service over the internal Docker network.
      MONGODB_URI: mongodb://mongo:27017/smilemaker
      NODE_ENV: production
      PORT: "3001"
    networks:
      - internal
      - traefik-public
    labels:
      traefik.enable: "true"
      traefik.http.routers.smilemaker-api.rule: "Host(`api.yourdomain.com`)"
      traefik.http.routers.smilemaker-api.entrypoints: "websecure"
      traefik.http.routers.smilemaker-api.tls.certresolver: "letsencrypt"
      traefik.http.services.smilemaker-api.loadbalancer.server.port: "3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: https://api.yourdomain.com
    restart: always
    networks:
      - traefik-public
    labels:
      traefik.enable: "true"
      traefik.http.routers.smilemaker-web.rule: "Host(`yourdomain.com`) || Host(`www.yourdomain.com`)"
      traefik.http.routers.smilemaker-web.entrypoints: "websecure"
      traefik.http.routers.smilemaker-web.tls.certresolver: "letsencrypt"
      traefik.http.services.smilemaker-web.loadbalancer.server.port: "80"

networks:
  internal:
  traefik-public:
    external: true

volumes:
  mongo-data:
